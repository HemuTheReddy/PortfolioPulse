version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20 && nvm use 20
            - test -n "$NEXT_PUBLIC_API_URL" || (echo "NEXT_PUBLIC_API_URL is required" && exit 1)
            - case "$NEXT_PUBLIC_API_URL" in http://*|https://*) ;; *) echo "NEXT_PUBLIC_API_URL must be a full http(s) URL" && exit 1 ;; esac
            - case "$NEXT_PUBLIC_API_URL" in */) echo "NEXT_PUBLIC_API_URL must not have trailing slash" && exit 1 ;; *) ;; esac
            - npm ci
        build:
          commands:
            - echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL"
            - npm run build
      artifacts:
        baseDirectory: out
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
